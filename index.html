<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Simples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 50px 0;
        }
        .header h1 {
            margin: 0;
            font-size: 48px;
        }
        .main-content {
            padding: 40px;
            text-align: center;
        }
        .cta-button {
            background-color: #4CAF50;
            color: white;
            font-size: 18px;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
        .cta-button:hover {
            background-color: #45a049;
        }
        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Bem-vindo à Nossa Landing Page!</h1>
        <p>Transforme sua experiência agora mesmo!</p>
    </div>

    <div class="main-content">
        <h2>Estamos aqui para ajudar você a alcançar seus objetivos.</h2>
        <p>Descubra como nosso produto pode fazer a diferença para você.</p>
        <a href="#" class="cta-button">Saiba mais</a>
    </div>

    <div class="footer">
        <p>&copy; 2026 Todos os direitos reservados.</p>
    </div>
</body>
</html>
